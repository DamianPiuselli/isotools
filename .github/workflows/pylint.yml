name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Analysing the code with pylint
        run: |
          pylint $(git ls-files '*.py') --exit-zero | tee /tmp/pylint_output.txt
          python3 -c "
          import re, sys
          with open('/tmp/pylint_output.txt') as f:
              content = f.read()
          match = re.search(r'rated at (\d+\.\d+)', content)
          if not match:
              print('Could not parse pylint score')
              sys.exit(1)
          score = float(match.group(1))
          threshold = 8.5
          print(f'Pylint score: {score}/10 (threshold: {threshold})')
          sys.exit(0 if score >= threshold else 1)
          "
